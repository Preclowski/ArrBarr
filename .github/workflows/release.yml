name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Build
        run: |
          xcodebuild -project ArrBarr.xcodeproj \
            -scheme ArrBarr \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Test
        run: |
          xcodebuild -project ArrBarr.xcodeproj \
            -scheme ArrBarr \
            -configuration Debug \
            -derivedDataPath build \
            test

      - name: Create DMG
        if: github.event_name == 'release'
        run: |
          mkdir -p dmg-staging
          cp -R build/Build/Products/Release/ArrBarr.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "ArrBarr" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            ArrBarr.dmg

      - name: Upload to Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" ArrBarr.dmg

      - name: Update Homebrew Cask
        if: github.event_name == 'release'
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          SHA=$(shasum -a 256 ArrBarr.dmg | awk '{print $1}')
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          git clone https://x-access-token:${TAP_TOKEN}@github.com/Preclowski/homebrew-arrbarr.git tap
          cd tap

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/arrbarr.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/arrbarr.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/arrbarr.rb
          git commit -m "Update ArrBarr to ${VERSION}"
          git push
