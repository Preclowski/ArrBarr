name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Build
        run: |
          xcodebuild -project ArrBarr.xcodeproj \
            -scheme ArrBarr \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Create DMG
        if: github.event_name == 'release'
        run: |
          mkdir -p dmg-staging
          cp -R build/Build/Products/Release/ArrBarr.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "ArrBarr" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            ArrBarr.dmg

      - name: Upload to Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" ArrBarr.dmg
